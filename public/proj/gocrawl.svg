<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800">
  <defs>
    <linearGradient id="g" x1="0" x2="1">
      <stop offset="0%" stop-color="#0ea5a1" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#10b981" stop-opacity="0.95"/>
    </linearGradient>
    <filter id="blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="30" result="b" />
      <feMerge><feMergeNode in="b"/></feMerge>
    </filter>
  </defs>

  <!-- background -->
  <rect width="1200" height="800" fill="#0f172a" />

  <!-- subtle grid dots -->
  <g opacity="0.08">
    <rect width="1200" height="800" fill="url(#dotpattern)" />
  </g>

  <!-- radial glow -->
  <circle cx="520" cy="380" r="260" fill="url(#g)" opacity="0.06" filter="url(#blur)" />

  <!-- network nodes + links -->
  <g stroke="#0ea5a1" stroke-opacity="0.6" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <path d="M360 480 L520 360 L700 420 L820 300" />
    <path d="M420 300 L520 360" />
    <path d="M520 360 L620 240" />
  </g>

  <!-- nodes -->
  <g>
    <circle cx="360" cy="480" r="14" fill="#052025" stroke="url(#g)" stroke-width="6" />
    <circle cx="520" cy="360" r="18" fill="#052025" stroke="url(#g)" stroke-width="8" />
    <circle cx="700" cy="420" r="12" fill="#052025" stroke="url(#g)" stroke-width="5" />
    <circle cx="820" cy="300" r="10" fill="#052025" stroke="url(#g)" stroke-width="5" />
    <circle cx="620" cy="240" r="9" fill="#052025" stroke="url(#g)" stroke-width="4" />
  </g>

  <!-- crawler magnifier (center-right) -->
  <g transform="translate(760,420) scale(1.4)">
    <circle cx="0" cy="0" r="46" fill="#00121a" stroke="url(#g)" stroke-width="7" />
    <circle cx="-8" cy="-6" r="28" fill="rgba(16,185,129,0.06)" stroke="#10b981" stroke-opacity="0.5" stroke-width="2" />
    <path d="M28 28 L52 52" stroke="#0ea5a1" stroke-width="7" stroke-linecap="round" />
    <circle cx="-8" cy="-6" r="6" fill="#10b981" />
  </g>

  <!-- title label -->
  <g transform="translate(60,680)">
    <rect x="0" y="0" width="420" height="84" rx="12" fill="#00121a" opacity="0.6" />
    <text x="30" y="52" font-family="Inter, Arial, sans-serif" font-size="36" fill="#c7f9ef" font-weight="700">GoCrawl</text>
  </g>

</svg>